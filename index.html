<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Bridge - Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">📚</span>
      <h1>Book Bridge</h1>
      <p>Your online book rental &amp; buying platform</p>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- ── LOGIN ── -->
    <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)" novalidate>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" />
        <span class="field-error" id="err-loginEmail"></span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" />
          <button type="button" class="pw-toggle" onclick="togglePw('loginPassword',this)">👁</button>
        </div>
        <span class="field-error" id="err-loginPassword"></span>
      </div>
      <div id="loginError" class="error-msg"></div>
      <button type="submit" class="btn-primary">Login</button>
    </form>

    <!-- ── SIGNUP ── -->
    <form id="signupForm" class="auth-form hidden" onsubmit="handleSignup(event)" novalidate>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your full name" autocomplete="name" />
        <span class="field-error" id="err-signupName"></span>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" />
        <span class="field-error" id="err-signupEmail"></span>
      </div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="signupUsername" placeholder="Choose a username (min 3 chars)" autocomplete="username" />
        <span class="field-error" id="err-signupUsername"></span>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="signupPassword" placeholder="Min 8 chars, 1 number, 1 special" autocomplete="new-password" oninput="checkStrength(this.value)" />
          <button type="button" class="pw-toggle" onclick="togglePw('signupPassword',this)">👁</button>
        </div>
        <div class="pw-strength" id="pwStrength">
          <div class="pw-bar" id="pwBar"></div>
        </div>
        <span class="pw-hint" id="pwHint"></span>
        <span class="field-error" id="err-signupPassword"></span>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="signupConfirm" placeholder="Repeat password" autocomplete="new-password" />
          <button type="button" class="pw-toggle" onclick="togglePw('signupConfirm',this)">👁</button>
        </div>
        <span class="field-error" id="err-signupConfirm"></span>
      </div>
      <div class="form-group">
        <label>I am a…</label>
        <div class="role-picker">
          <label class="role-card role-card--active" id="roleReaderCard">
            <input type="radio" name="role" value="reader" checked onchange="highlightRole()" />
            <span class="role-icon">📖</span>
            <span class="role-name">Reader</span>
            <span class="role-desc">Browse, rent &amp; buy books</span>
          </label>
          <label class="role-card" id="roleWriterCard">
            <input type="radio" name="role" value="writer" onchange="highlightRole()" />
            <span class="role-icon">✍️</span>
            <span class="role-name">Writer</span>
            <span class="role-desc">List your books for others</span>
          </label>
        </div>
      </div>
      <div id="signupError" class="error-msg"></div>
      <button type="submit" class="btn-primary">Create Account</button>
    </form>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
